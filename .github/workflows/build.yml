name: Build Ghost APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Critical Dependencies
        run: |
          sudo apt update
          # Autotools aur missing libraries ka combo
          sudo apt install -y git zip unzip autoconf automake libtool m4 pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev \
          build-essential python3-dev libltdl-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy

      - name: Build with Buildozer
        run: |
          # Buildozer ko batana padega ki hum automated environment mein hain
          yes | buildozer android debug
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-ghost-v6-apk
          path: bin/*.apk
