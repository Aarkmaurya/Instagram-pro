name: Build V5
on: push
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev libxml2-dev libxslt1-dev gettext m4 python3-pip python3-setuptools libsqlite3-dev sqlite3
          python3 -m pip install --user --upgrade buildozer "cython<3.0" sh
          export PATH=$PATH:$HOME/.local/bin
          yes | buildozer -v android debug
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Instagram-V5-CrashFree
          path: bin/*.apk
